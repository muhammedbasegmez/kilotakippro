<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kilo Takip</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#09090b">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #09090b; --surface: #18181b; --surface2: #27272a; --accent: #22d3ee; --text: #fafafa; --muted: #a1a1aa;
  --border: rgba(255,255,255,0.06); --push: #38bdf8; --pull: #34d399; --leg: #fbbf24; --upper: #c084fc;
  --red: #ef4444; --gold: #facc15; --radius: 20px; --font-display: 'Bebas Neue', sans-serif; --font-body: 'DM Sans', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: var(--font-body); background: var(--bg); color: var(--text); min-height: 100vh; max-width: 430px; margin: 0 auto; overflow-x: hidden; padding-bottom: 110px; }
.settings-btn { position: absolute; top: 52px; right: 20px; background: var(--surface2); border: 1px solid var(--border); border-radius: 50%; width: 42px; height: 42px; color: var(--text); z-index: 10; display: flex; align-items: center; justify-content: center; font-size: 18px; }
.nav { display: flex; justify-content: space-around; background: rgba(15, 15, 18, 0.85); backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.04); padding: 12px 10px 24px; position: fixed; bottom: 0; width: 100%; max-width: 430px; z-index: 100; }
.nav-btn { display: flex; flex-direction: column; align-items: center; gap: 6px; background: none; border: none; cursor: pointer; opacity: 0.4; transition: 0.3s; }
.nav-btn.active { opacity: 1; color: var(--accent); }
.nav-icon { font-size: 22px; }
.nav-label { font-size: 10px; font-weight: 600; }
.page { display: none; animation: fadeIn 0.4s ease forwards; }
.page.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.page-header { padding: 56px 20px 24px; }
.header-title { font-family: var(--font-display); font-size: 46px; color: var(--text); line-height: 1; }
.day-pills { display: flex; gap: 10px; padding: 0 20px 20px; overflow-x: auto; scrollbar-width: none; }
.day-pill { flex-shrink: 0; padding: 12px 20px; border-radius: 100px; border: 1px solid var(--border); background: rgba(24,24,27,0.8); color: var(--muted); font-size: 13px; font-weight: 600; }
.day-pill.active-push { border-color: var(--push); color: var(--push); background: rgba(56,189,248,0.1); }
.day-pill.active-pull { border-color: var(--pull); color: var(--pull); background: rgba(52,211,153,0.1); }
.day-pill.active-leg  { border-color: var(--leg); color: var(--leg); background: rgba(251,191,36,0.1); }
.day-pill.active-upper { border-color: var(--upper); color: var(--upper); background: rgba(192,132,252,0.1); }

.ex-card { background: linear-gradient(160deg, #1c1c20 0%, #121215 100%); border: 1px solid rgba(255,255,255,0.04); border-radius: var(--radius); margin: 0 16px 16px; overflow: hidden; }
.ex-top { padding: 18px 16px 10px; display: flex; align-items: center; justify-content: space-between; }
.ex-name { font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 6px; }
.overload-card { margin: 0 16px 10px; padding: 10px; background: rgba(52,211,153,0.1); border: 1px solid rgba(52,211,153,0.2); border-radius: 10px; font-size: 12px; font-weight: 700; color: var(--pull); display: flex; align-items: center; gap: 6px; }
.target-card { margin: 0 16px 10px; padding: 10px; background: rgba(255,255,255,0.03); border: 1px dashed rgba(255,255,255,0.1); border-radius: 10px; font-size: 12px; font-weight: 600; color: var(--muted); }
.set-grid { display: grid; grid-template-columns: 32px 1fr 1fr 65px 30px; gap: 8px; padding: 6px 16px; align-items: center; }
.set-num { width: 32px; height: 32px; border-radius: 8px; background: rgba(255,255,255,0.03); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; border: 1px solid var(--border); }
.drop-badge { background: rgba(239, 68, 68, 0.15); color: #ef4444; border-color: rgba(239, 68, 68, 0.3); }
.set-input { width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-radius: 10px; color: #fff; padding: 10px 4px; text-align: center; font-size: 14px; font-weight: 600; outline: none; }
.set-input::placeholder { color: rgba(255, 255, 255, 0.15); font-style: italic; }
.ex-note-input { width: 100%; background: rgba(255,255,255,0.03); border: none; border-top: 1px solid var(--border); color: var(--accent); font-size: 12px; padding: 12px 16px; outline: none; }
.del-set { color: var(--red); font-size: 18px; cursor: pointer; opacity: 0.5; text-align: center; }
.btn-action { background: none; border: 1px dashed rgba(255,255,255,0.1); color: var(--muted); padding: 10px; border-radius: 12px; font-size: 11px; font-weight: 700; width: calc(100% - 32px); margin: 4px 16px 14px; cursor: pointer; }

/* ---- MONTHLY CALENDAR ---- */
.calendar-container { background: #121215; border-radius: var(--radius); padding: 16px; margin-bottom: 20px; border: 1px solid var(--border); }
.calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
.cal-weekday { font-size: 9px; text-align: center; color: var(--muted); font-weight: 700; padding-bottom: 6px; }
.cal-day { aspect-ratio: 1; border-radius: 6px; border: 1px solid rgba(255,255,255,0.03); display: flex; align-items: center; justify-content: center; font-size: 11px; color: var(--muted); position: relative; }
.cal-day.has-push { border-color: var(--push); background: rgba(56,189,248,0.2); color: var(--push); font-weight: bold; }
.cal-day.has-pull { border-color: var(--pull); background: rgba(52,211,153,0.2); color: var(--pull); font-weight: bold; }
.cal-day.has-leg  { border-color: var(--leg); background: rgba(251,191,36,0.2); color: var(--leg); font-weight: bold; }
.cal-day.has-upper { border-color: var(--upper); background: rgba(192,132,252,0.2); color: var(--upper); font-weight: bold; }

.chart-container { background: #121215; border-radius: var(--radius); padding: 16px; margin-bottom: 20px; border: 1px solid var(--border); }
.modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 300; align-items: flex-end; }
.modal-backdrop.open { display: flex; }
.modal-sheet { background: var(--surface); border-radius: 28px 28px 0 0; padding: 24px 20px 40px; width: 100%; max-width: 430px; margin: 0 auto; }
.toast { position: fixed; bottom: 110px; left: 50%; transform: translateX(-50%) translateY(20px); background: #18181b; border: 1px solid var(--accent); color: var(--accent); padding: 12px 24px; border-radius: 100px; font-size: 13px; font-weight: 600; opacity: 0; transition: 0.3s; z-index: 400; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<button class="settings-btn" onclick="openSettings()">🛡️</button>
<div class="toast" id="toast"></div>

<!-- ANTRENMAN SAYFASI -->
<div class="page active" id="page-log">
  <div class="page-header"><div class="header-title">KİLO <span>TAKİP</span></div></div>
  <div class="day-pills">
    <button class="day-pill" data-day="push" onclick="selectDay('push')">İtiş (Pzt)</button>
    <button class="day-pill" data-day="pull" onclick="selectDay('pull')">Çekiş (Sal)</button>
    <button class="day-pill" data-day="leg" onclick="selectDay('leg')">Bacak (Per)</button>
    <button class="day-pill" data-day="upper" onclick="selectDay('upper')">Upper (Cmt)</button>
  </div>
  <div style="padding:0 20px 16px;"><input type="date" id="log-date" class="set-input" style="padding:14px; font-size:16px;" onchange="onDateChange()" /></div>
  <div id="ex-list"></div>
  <button class="btn-action" style="margin:20px 16px; border-style:solid;" onclick="addCustomExercise()">+ Yeni Hareket Ekle</button>
</div>

<!-- GEÇMİŞ SAYFASI -->
<div class="page" id="page-history">
  <div class="page-header"><div class="header-title">GEÇ<span>MİŞ</span></div></div>
  <div id="hist-feed" style="padding:0 16px;"></div>
</div>

<!-- İLERLEME SAYFASI -->
<div class="page" id="page-progress">
  <div class="page-header"><div class="header-title">İLER<span>LEME</span></div></div>
  <div style="padding:0 20px 10px;">
    <div class="calendar-container">
      <div class="calendar-header">
        <div id="cal-month-name" style="font-size:14px; font-weight:700;">Mayıs 2026</div>
        <div id="month-total-count" style="font-size:11px; color:var(--muted);">0 Antrenman</div>
      </div>
      <div class="calendar-grid" id="cal-grid"></div>
    </div>
  </div>
  <div style="padding:0 20px;"><select class="set-input" id="prog-ex-sel" onchange="renderProgress()" style="margin-bottom:20px;"></select></div>
  <div id="prog-content" style="padding:0 20px;"></div>
</div>

<nav class="nav">
  <button class="nav-btn active" onclick="showPage('log',this)"><span class="nav-icon">🏋️</span><span class="nav-label">GÜNLÜK</span></button>
  <button class="nav-btn" onclick="showPage('history',this)"><span class="nav-icon">📅</span><span class="nav-label">GEÇMİŞ</span></button>
  <button class="nav-btn" onclick="showPage('progress',this)"><span class="nav-icon">🏆</span><span class="nav-label">İLERLEME</span></button>
</nav>

<div class="modal-backdrop" id="settings-modal" onclick="if(event.target===this)closeSettings()">
  <div class="modal-sheet">
    <div style="margin-bottom:20px; font-weight:700;">Veri Kasası 🛡️</div>
    <button class="set-input" onclick="exportData()" style="background:var(--accent); color:#000; margin-bottom:12px;">📥 JSON Yedekle</button>
    <button class="set-input" onclick="exportExcel()" style="background:var(--gold); color:#000; margin-bottom:12px;">📊 Excel (CSV) İndir</button>
    <label class="set-input" style="display:block; cursor:pointer; text-align:center;">📤 Yedek Yükle <input type="file" style="display:none" onchange="importData(event)"></label>
    <button class="set-input" style="color:var(--red); border-color:var(--red); margin-top:20px;" onclick="deleteDay()">🗑️ Günü Temizle</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script>
const EX_DB = [
  { id:'idp', name:'Incline DB Press' }, { id:'mcp', name:'Machine Chest Press' }, { id:'msp', name:'Machine Shoulder Press' },
  { id:'clr', name:'Cable Lateral Raise' }, { id:'trp', name:'Triceps Rope Pushdown' }, { id:'ote', name:'Overhead Triceps Extension' },
  { id:'latp', name:'Lat Pulldown' }, { id:'csm', name:'Chest-Supported Row' }, { id:'fp', name:'Face Pull' }, { id:'ibc', name:'Incline DB Curl' },
  { id:'shc', name:'Seated Hammer Curl' }, { id:'lpr', name:'Leg Press' }, { id:'bss', name:'Bulgarian Split Squat' },
  { id:'lex', name:'Leg Extension' }, { id:'slc', name:'Seated Leg Curl' }, { id:'lpc', name:'Calf Raise' },
  { id:'pdf', name:'Pec Deck Fly' }, { id:'latw', name:'Lat Pulldown Wide' }, { id:'dlr', name:'DB Lateral Raise' }, 
  { id:'rpd', name:'Reverse Pec Deck' }, { id:'mpc', name:'Machine Preacher Curl' }, { id:'tpd', name:'Triceps Pushdown' }
];

const DAYS = {
  push: { label: 'İtiş', exercises: [{id:'idp', sets:3, rpe:'8'}, {id:'mcp', sets:3, rpe:'8.5'}, {id:'msp', sets:3, rpe:'8'}, {id:'clr', sets:4, rpe:'9'}, {id:'trp', sets:3, rpe:'9'}, {id:'ote', sets:3, rpe:'8.5'}]},
  pull: { label: 'Çekiş', exercises: [{id:'latp', sets:3, rpe:'8'}, {id:'csm', sets:3, rpe:'8.5'}, {id:'fp', sets:3, rpe:'8'}, {id:'ibc', sets:3, rpe:'9'}, {id:'shc', sets:3, rpe:'9'}]},
  leg: { label: 'Bacak', exercises: [{id:'lpr', sets:4, rpe:'8.5'}, {id:'bss', sets:3, rpe:'8.5'}, {id:'lex', sets:3, rpe:'9.5'}, {id:'slc', sets:3, rpe:'9.5'}, {id:'lpc', sets:4, rpe:'9'}]},
  upper: { label: 'Upper', exercises: [{id:'pdf', sets:3, rpe:'8.5'}, {id:'latw', sets:4, rpe:'8.5'}, {id:'dlr', sets:4, rpe:'9'}, {id:'rpd', sets:3, rpe:'9'}, {id:'mpc', sets:3, rpe:'9.5'}, {id:'tpd', sets:3, rpe:'9.5'}]}
};

let logs = JSON.parse(localStorage.getItem('wt2_logs') || '[]');
let customNames = JSON.parse(localStorage.getItem('wt2_names') || '{}');
let customExercises = JSON.parse(localStorage.getItem('wt2_customs') || '{}');
let curDay = 'push';

function today() { return new Date().toLocaleDateString('sv'); }
function calcE1RM(w, r, rpe) { return w * (1 + 0.0333 * (r + (10 - (parseFloat(rpe)||10)))); }
function getExName(id) { return customNames[id] || EX_DB.find(x => x.id === id)?.name || id; }

function onDateChange() {
  const date = document.getElementById('log-date').value;
  const existing = logs.find(x => x.date === date);
  if(existing) curDay = existing.day;
  renderExList();
}

function selectDay(day) { curDay = day; save(); renderExList(); }

function renderExList() {
  const date = document.getElementById('log-date').value;
  const existing = logs.find(x => x.date === date) || { day: curDay, exercises: [] };
  const displayDay = existing.day || curDay;
  const baseEx = DAYS[displayDay]?.exercises || [];
  const extraEx = customExercises[displayDay] || [];
  const exercises = [...baseEx, ...extraEx];
  
  let html = '';
  exercises.forEach(exConf => {
    const id = exConf.id;
    const data = existing.exercises.find(e => e.id === id) || { sets: [], note: '' };
    const prev = [...logs].sort((a,b) => b.date.localeCompare(a.date)).find(l => l.date < date && l.exercises.some(e => e.id === id))?.exercises.find(e => e.id === id);

    let radar = '';
    if(prev) {
      const bestPrev = prev.sets.reduce((a,s) => Math.max(a, calcE1RM(s.w, s.r, s.rpe)), 0);
      const currentBest = data.sets.reduce((a,s) => Math.max(a, calcE1RM(s.w, s.r, s.rpe)), 0);
      if(currentBest > bestPrev) radar = `<div class="overload-card">🚀 PROGRESSIVE OVERLOAD!</div>`;
      else radar = `<div class="target-card">🎯 Hedefi Geç: ${Math.round(bestPrev)} kg e1RM</div>`;
    }

    const notePlaceholder = data.note || prev?.note || '';

    html += `<div class="ex-card" data-exid="${id}">
      <div class="ex-top"><div class="ex-name" onclick="renameEx('${id}')">${getExName(id)} ✏️</div></div>
      ${radar}
      <div class="sets-container">${renderSets(id, data.sets, prev, exConf)}</div>
      <div style="display:flex;"><button class="btn-action" onclick="addSet(this, false)">+ Set</button><button class="btn-action" style="color:var(--red);" onclick="addSet(this, true)">+ Drop</button></div>
      <input type="text" class="ex-note-input" placeholder="Not: ${notePlaceholder}" value="${data.note || ''}" oninput="save()">
    </div>`;
  });
  document.getElementById('ex-list').innerHTML = html;
  document.querySelectorAll('.day-pill').forEach(p => p.className = 'day-pill ' + (p.dataset.day === displayDay ? 'active-'+p.dataset.day : ''));
}

function renderSets(id, sets, prev, exConf) {
    const rpeDefault = exConf.rpe || '8';
    if(sets.length > 0) return sets.map((s, i) => renderSetRow(i, s, prev?.sets[i], rpeDefault)).join('');
    let res = '';
    for(let i=0; i<(exConf.sets||3); i++) res += renderSetRow(i, {w:'', r:'', rpe:''}, prev?.sets[i], rpeDefault);
    return res;
}

function renderSetRow(i, s, pS, rpeDefault) {
  const phW = pS ? pS.w : 'kg';
  const phR = pS ? pS.r : 'tek';
  return `<div class="set-grid">
    <div class="set-num ${s.isDrop?'drop-badge':''}">${s.isDrop?'DS':i+1}</div>
    <input type="number" inputmode="decimal" class="set-input w-in" placeholder="${phW}" value="${s.w||''}" oninput="save()">
    <input type="number" inputmode="numeric" class="set-input r-in" placeholder="${phR}" value="${s.r||''}" oninput="save()">
    <select class="set-input rpe-in" onchange="save()">
      ${[10,9.5,9,8.5,8,7.5,7,6].map(v => `<option value="${v}" ${ (s.rpe||rpeDefault) ==v ?'selected':''}>${v}</option>`).join('')}
    </select>
    <div class="del-set" onclick="delRow(this)">×</div>
  </div>`;
}

function delRow(btn) { btn.parentElement.remove(); save(); renderExList(); }

function addSet(btn, isDrop) {
  const container = btn.closest('.ex-card').querySelector('.sets-container');
  container.insertAdjacentHTML('beforeend', renderSetRow(container.children.length, { isDrop }));
  save();
}

function save() {
  const date = document.getElementById('log-date').value;
  const dayEx = [];
  document.querySelectorAll('.ex-card').forEach(card => {
    const id = card.dataset.exid;
    const note = card.querySelector('.ex-note-input').value;
    const sets = Array.from(card.querySelectorAll('.set-grid')).map(row => ({
      w: parseFloat(row.querySelector('.w-in').value),
      r: parseInt(row.querySelector('.r-in').value),
      rpe: row.querySelector('.rpe-in').value,
      isDrop: row.querySelector('.set-num').classList.contains('drop-badge')
    })).filter(s => s.w > 0);
    if(sets.length || note) dayEx.push({ id, sets, note });
  });
  logs = logs.filter(l => l.date !== date);
  if(dayEx.length || date === today()) logs.push({ date, day: curDay, exercises: dayEx });
  localStorage.setItem('wt2_logs', JSON.stringify(logs));
}

function renderHistory() {
  const f = document.getElementById('hist-feed');
  if(!logs.length) { f.innerHTML = '<div style="text-align:center; color:var(--muted); padding:40px;">Kayıt yok.</div>'; return; }
  f.innerHTML = logs.sort((a,b) => b.date.localeCompare(a.date)).map(l => `
    <div class="chart-container" onclick="goToDate('${l.date}')">
      <div style="display:flex; justify-content:space-between; margin-bottom:12px;"><div style="font-weight:700;">${l.date}</div><div style="color:var(--${l.day}); font-weight:700;">${l.day.toUpperCase()}</div></div>
      <div style="font-size:12px; color:var(--muted);">${l.exercises.length} Hareket. İncelemek için tıkla.</div>
    </div>`).join('');
}

function goToDate(date) { 
  document.getElementById('log-date').value = date; 
  onDateChange(); 
  showPage('log', document.querySelectorAll('.nav-btn')[0]); 
}

function renderCalendar() {
  const grid = document.getElementById('cal-grid');
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth();
  
  const trMonths = ["Ocak", "Şubat", "Mart", "Nisan", "Mayıs", "Haziran", "Temmuz", "Ağustos", "Eylül", "Ekim", "Kasım", "Aralık"];
  document.getElementById('cal-month-name').innerText = `${trMonths[month]} ${year}`;

  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const offset = (firstDay === 0 ? 6 : firstDay - 1); 

  grid.innerHTML = ['Pzt','Sal','Çar','Per','Cum','Cmt','Paz'].map(d => `<div class="cal-weekday">${d}</div>`).join('');
  
  for(let i=0; i<offset; i++) grid.innerHTML += `<div></div>`;
  
  let monthCount = 0;
  for(let i=1; i<=daysInMonth; i++) {
    const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
    const log = logs.find(l => l.date === ds && l.exercises.length > 0);
    let cls = '';
    if(log) { cls = `has-${log.day}`; monthCount++; }
    grid.innerHTML += `<div class="cal-day ${cls}">${i}</div>`;
  }
  document.getElementById('month-total-count').innerText = `${monthCount} Antrenman`;
  renderProgressList();
}

function showPage(id, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`page-${id}`).classList.add('active');
  btn.classList.add('active');
  if(id === 'progress') renderCalendar();
  if(id === 'history') renderHistory();
}

function renderProgressList() {
  const ids = [...new Set(logs.flatMap(l => l.exercises.map(e => e.id)))];
  document.getElementById('prog-ex-sel').innerHTML = '<option value="">— Hareket Seç —</option>' + ids.map(id => `<option value="${id}">${getExName(id)}</option>`).join('');
}

let chart;
function renderProgress() {
  const id = document.getElementById('prog-ex-sel').value;
  if(!id) return;
  const data = logs.filter(l => l.exercises.some(e => e.id === id)).sort((a,b) => a.date.localeCompare(b.date)).map(l => {
    const ex = l.exercises.find(e => e.id === id);
    return { date: l.date, val: Math.round(ex.sets.reduce((a,s) => Math.max(a, calcE1RM(s.w, s.r, s.rpe)), 0)) };
  });
  document.getElementById('prog-content').innerHTML = `<div class="chart-container"><canvas id="chart"></canvas></div>`;
  if(chart) chart.destroy();
  chart = new Chart(document.getElementById('chart').getContext('2d'), {
    type: 'line',
    data: { 
      labels: data.map(d => d.date.slice(5)), 
      datasets: [{ 
        data: data.map(d => d.val), 
        borderColor: '#22d3ee', 
        backgroundColor: 'rgba(34,211,238,0.1)', 
        fill: true, 
        tension: 0.4,
        pointBackgroundColor: '#22d3ee',
        pointRadius: 4
      }] 
    },
    options: { plugins: { legend: { display: false } }, scales: { y: { grid: { color: 'rgba(255,255,255,0.05)' } }, x: { grid: { display: false } } } }
  });
}

function openSettings() { document.getElementById('settings-modal').classList.add('open'); }
function closeSettings() { document.getElementById('settings-modal').classList.remove('open'); }
function exportData() {
  const blob = new Blob([JSON.stringify({ logs, customNames, customExercises })], { type: 'application/json' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `VucutKasa_Yedek.json`; a.click();
}
function exportExcel() {
    let csv = "\uFEFFTarih;Gun;Hareket;Agirlik;Tekrar;RPE;Not\n";
    logs.forEach(l => l.exercises.forEach(e => e.sets.forEach(s => {
        csv += `${l.date};${l.day};${getExName(e.id)};${s.w};${s.r};${s.rpe};${e.note||''}\n`;
    })));
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `Antrenman_Gelisim.csv`; a.click();
}
function importData(e) {
  const reader = new FileReader();
  reader.onload = (ev) => {
    const d = JSON.parse(ev.target.result);
    if(d.logs) { logs = d.logs; customNames = d.customNames || {}; customExercises = d.customExercises || {}; localStorage.setItem('wt2_logs', JSON.stringify(logs)); location.reload(); }
  };
  reader.readAsText(e.target.files[0]);
}
function addCustomExercise() {
    const n = prompt("Hareket Adı:");
    if(!n) return;
    const id = "c_" + Date.now();
    if(!customExercises[curDay]) customExercises[curDay] = [];
    customExercises[curDay].push({ id, name:n, sets:3, rpe:'8', custom:true });
    save(); renderExList();
}
function deleteDay() { if(confirm("Günü temizle?")) { const d = document.getElementById('log-date').value; logs = logs.filter(l => l.date !== d); localStorage.setItem('wt2_logs', JSON.stringify(logs)); location.reload(); } }

document.getElementById('log-date').value = today();
onDateChange();
</script>
</body>
